<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Castrosua IA</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #1f1f1f;
      }

      body {
        color: #ededed;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-shell {
        display: grid;
        grid-template-rows: 36px 1fr;
        width: 100%;
        height: 100%;
        background: #1f1f1f;
      }

      .boot-titlebar {
        -webkit-app-region: drag;
        border-bottom: 1px solid rgba(255, 255, 255, 0.055);
        background: #1f1f1f;
      }

      .boot-content {
        display: grid;
        place-items: center;
        background: #151515;
      }

      .boot-loader {
        display: grid;
        justify-items: center;
        gap: 16px;
        color: rgba(237, 237, 237, 0.72);
        letter-spacing: -0.02em;
      }

      .boot-label {
        font-size: 13px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell" aria-label="Loading Castrosua IA">
        <div class="boot-titlebar"></div>
        <main class="boot-content">
          <div class="boot-loader" role="status" aria-live="polite">
            <div class="boot-label">Iniciando aplicación...</div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
