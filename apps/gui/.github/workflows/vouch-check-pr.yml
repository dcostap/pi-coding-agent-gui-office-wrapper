name: Vouch - Check PR

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: mitchellh/vouch/action/check-pr@v1.4.2
        with:
          pr-number: ${{ github.event.pull_request.number }}
          auto-close: true
          vouched-file: .github/VOUCHED.td
        env:
          GITHUB_TOKEN: ${{ github.token }}
