appId: castrosua.ia.desktop
productName: Castrosua IA
icon: public/howcode-icon.png
afterPack: scripts/after-pack.cjs
directories:
  output: artifacts/electron
files:
  - dist/**
  - build/electron/**
  - build/desktop/**
  - package.json
asar: false
npmRebuild: false
extraResources:
  - from: desktop/resources/skills
    to: resources/skills
  - from: build/native/windows-sandbox-helper
    to: windows-sandbox-helper
    filter:
      - "*.exe"
  - from: desktop/build/runtime/python
    to: runtime/python
  - from: desktop/build/runtime/uv
    to: runtime/uv
  - from: desktop/build/runtime/tools
    to: runtime/tools
  - from: desktop/build/legal
    to: legal
extraFiles:
  - from: desktop/deployment/windows/setup-sandbox.ps1
    to: setup-sandbox.ps1
  - from: desktop/deployment/windows/start-castrosua-ia.bat
    to: start-castrosua-ia.bat
mac:
  category: public.app-category.developer-tools
  extendInfo:
    NSMicrophoneUsageDescription: Castrosua IA necesita acceso al micrófono para el dictado local.
  target:
    - dir
linux:
  target:
    - dir
    - AppImage
win:
  icon: public/howcode-icon.ico
  signAndEditExecutable: false
  target:
    - dir
    - zip
    - nsis
nsis:
  artifactName: ${productName} Setup ${version}-${arch}.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  createStartMenuShortcut: true
asarUnpack:
  - node_modules/**/*.node
  - node_modules/node-pty/build/Release/**
  - node_modules/node-pty/prebuilds/**
  - node_modules/sherpa-onnx-node/**
  - node_modules/sherpa-onnx-*/**
